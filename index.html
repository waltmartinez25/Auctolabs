<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#04212b" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/logo.png">

    <!-- DNS prefetch / preconnect for performance -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://www.googletagmanager.com">

    <!-- Preload critical OG image for social scrapers -->
    <link rel="preload" as="image" href="/og-image.jpg" fetchpriority="low">

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_MEASUREMENT_ID%"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '%VITE_GA_MEASUREMENT_ID%', { send_page_view: false });
    </script>

    <!--
      NOTE: All <title>, <meta name="description">, <meta property="og:*">,
      <meta name="twitter:*">, and <link rel="canonical"> tags are injected
      per-page by react-helmet-async via the SEO component.
      Do NOT add any of those here — duplicates will harm SEO and social sharing.
    -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
